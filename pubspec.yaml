name: nexus
description: "Connect your goals. Build your life."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  drift: ^2.23.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1

  # Graph rendering
  graphview: ^1.2.0

  # Charts
  fl_chart: ^0.70.2

  # YAML parsing
  yaml: ^3.1.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0

  # File I/O
  path_provider: ^2.1.5
  share_plus: ^10.1.2
  file_picker: ^8.3.3

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.1
  path: ^1.9.1
  collection: ^1.19.1
  url_launcher: ^6.3.2
  home_widget: ^0.9.1
  usage_stats: ^1.1.0
  wakelock_plus: ^1.5.2
  audioplayers: ^6.6.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.23.0
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/launcher_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/logo/launcher_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#000000"
  image: "assets/logo/launcher_icon.png"
  android_12:
    color: "#000000"
    image: "assets/logo/launcher_icon.png"
  fullscreen: true
